# KeskOS hidden KDE System Settings modules
# These modules stay installed but are hidden from the normal settings UI.
# Restore with: sudo kesk-restore-kcms

# Online/cloud
kcm_kaccounts                 # Online accounts are not part of the default KeskOS desktop flow

# Mobile-only
kcm_cellular_network          # Plasma Mobile / cellular data
kcm_mobile_wifi               # Plasma Mobile
kcm_mobile_wired              # Plasma Mobile
kcm_mobile_power              # Plasma Mobile
kcm_plasmakeyboard            # Plasma virtual keyboard stack
kcm_virtualkeyboard           # Virtual keyboard selector

# Debug/info/inspection
kcm_audio_information         # Audio device inspection
kcm_block_devices             # Block device inventory
kcm_cpu                       # CPU info page
kcm_edid                      # Raw EDID inspection
kcm_egl                       # EGL info page
kcm_energyinfo                # Energy info diagnostics
kcm_firmware_security         # Firmware security inspection
kcm_glx                       # GLX info page
kcm_interrupts                # Interrupt table
kcm_kwinsupportinfo           # KWin support dump
kcm_memory                    # Memory info page
kcm_opencl                    # OpenCL info page
kcm_pci                       # PCI inventory
kcm_sensors                   # Sensor inspection
kcm_vulkan                    # Vulkan info page
kcm_wayland                   # Wayland compositor diagnostics
kcm_xserver                   # X server diagnostics

# Server / enterprise / niche
kcm_krdpserver                # Remote desktop hosting
kcm_samba                     # Samba status monitor
kcm_bolt                      # Thunderbolt management

# Unclear / duplicate / niche
kcm_qtquicksettings           # Internal Qt Quick settings page
kcm_nighttime                 # Companion page for Night Light schedules
kcm_kwinxwayland              # Legacy X11 key passthrough tuning
kcm_kwintouchscreen           # Touchscreen swipe gestures
